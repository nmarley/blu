[package]
name = "blu"
version = "0.3.9"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
age = "0.7"
bincode = "1.3"
chrono = "0.4"
clap = { version = "4.3", features = ["derive"] }
flate2 = "1.0"
hex = "0.4.3"
itertools = "0.11.0"
log = "0.4"
multihash = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
simplelog = "0.10"
suffix = "1.3"
tempfile = "3.3"
walkdir = "2"
