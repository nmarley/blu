[package]
name = "blu"
version = "0.4.1"
edition = "2021"
authors = ["Nathan Marley <nathan.marley@gmail.com>"]
license = "MIT OR Apache-2.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
age = "0.7"
bincode = "1.3"
chrono = "0.4"
clap = { version = "4.3", features = ["derive"] }
flate2 = "1.0"
hex = "0.4.3"
itertools = "0.11.0"
log = "0.4"
multihash = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
simplelog = "0.10"
suffix = "1.3"
tempfile = "3.3"
walkdir = "2"
# todo: s3 feature
# note: consider non-rustls not supported. Not a fan of openssl
aws-config = "0.56"
aws-sdk-s3 = "0.29"
aws-smithy-runtime-api = "0.56"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
