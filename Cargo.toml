[package]
name = "blu"
version = "0.4.3"
edition = "2021"
authors = ["Nathan Marley <nathan.marley@gmail.com>"]
license = "MIT OR Apache-2.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
age = "0.10"
async-channel = "2.2"
async-trait = "0.1"
aws-config = { version = "1.1.5", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1.15.0"
aws-smithy-runtime-api = "1.1.5"
bincode = "1.3"
chrono = "0.4"
clap = { version = "4.3", features = ["derive"] }
flate2 = "1.0"
futures = "0.3"
hex = "0.4"
itertools = "0.11.0"
log = "0.4"
multihash = "0.19"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
sha2 = { version = "0.10", features = ["std", "asm", "asm-aarch64", "compress"] }
simplelog = "0.10"
suffix = "1.3"
tempfile = "3.3"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
toml = "0.8"
walkdir = "2"
