[package]
name = "blu"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
age = "0.7"
#age = { version = "0.7", features = ["async" , "ssh"] }
bincode = "1.3"
clap = { version = "3.1.2", features = ["derive"] }
filemagic = "0.12.3"
flate2 = "1.0"
hex = "0.4.3"
multihash = "0.16"
rusqlite = "0.26.3"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
walkdir = "2"
